name: Build Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            build_args: --win --x64
            artifact_name: log-reading-windows-amd64
          - name: macos-amd64
            os: macos-latest
            build_args: --mac --x64
            artifact_name: log-reading-macos-amd64
          - name: macos-arm64
            os: macos-latest
            build_args: --mac --arm64
            artifact_name: log-reading-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npx electron-builder ${{ matrix.build_args }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/**
          if-no-files-found: error
